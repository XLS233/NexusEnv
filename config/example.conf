# NexusEnv 配置文件示例
# 路径: ~/.config/nexus/config
#
# 用法: nexus init 可自动生成此文件
# 格式: INI — [section] 下的 key = value
#
# 通用格式:
#   [server.<hostname>]       — 服务器配置
#   [general]                 — 全局设置

[general]
# 默认的远程用户名（nexus init 自动检测）
default_user = john
# 挂载根目录
mount_base = ~/mnt
# SSH socket 目录
socket_dir = ~/.ssh/sockets
# ControlPersist 超时（秒，默认 4 小时；也可设为 yes 表示永久保持）
control_persist = 14400

[server.myserver]
# 服务器类型: cloud（普通云服务器）或 slurm（Slurm 集群）
type = cloud
# 远程路径配置（key = 挂载目标名, value = 远程绝对路径）
home = ~
workspace = /data/workspace
# nexus mount 默认挂载哪些目标（逗号分隔）
default_mounts = home, workspace
# nexus ssh 自动 cd 的目录
ssh_workdir = /data/workspace
# 依赖: 连接此 host 前需要先连接的 host（用于跳板机场景）
depends =

[server.internal]
type = slurm
home = ~
workspace = /data/workspace
default_mounts = home, workspace
ssh_workdir = /data/workspace
# internal 通过 myserver 跳板连接，需要先连 myserver
depends = myserver

[server.cloudvm]
type = cloud
home = ~
default_mounts = home
ssh_workdir = ~
depends =
